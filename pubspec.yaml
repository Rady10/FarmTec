name: farmtec
description: "FarmTec - Precision Intelligence for the Modern Farm"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  svg_flutter: ^0.0.1
  shared_preferences: ^2.3.3
  fl_chart: ^0.69.0
  http: ^1.6.0
  flutter_markdown: ^0.7.7+1
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#ffffff"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
